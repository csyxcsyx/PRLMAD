<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRLMAD</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="eyebrow">China Software Cup A3</div>
        <h1>个性化学习资源多智能体系统</h1>
      </div>
      <div class="status" id="status">初始化</div>
    </header>

    <main class="layout">
      <section class="panel ingest">
        <h2>知识库</h2>
        <label>
          课程
          <input id="course" value="操作系统" />
        </label>
        <label>
          教材路径
          <input id="docPath" placeholder="粘贴本地 PDF / TXT / MD 路径" />
        </label>
        <label>
          标题
          <input id="docTitle" value="操作系统概念" />
        </label>
        <button id="ingestBtn">导入教材</button>
        <div class="docs" id="docs"></div>
      </section>

      <section class="panel learner">
        <h2>学习画像输入</h2>
        <div class="grid">
          <label>
            专业
            <input id="major" value="计算机科学与技术" />
          </label>
          <label>
            学习目标
            <input id="goal" value="理解进程同步、死锁和内存管理" />
          </label>
          <label>
            知识基础
            <input id="level" value="学过 C/Python，操作系统概念容易混淆" />
          </label>
          <label>
            学习历史
            <input id="history" placeholder="最近学习记录、练习表现" />
          </label>
          <label>
            资源偏好
            <input id="preferences" value="图解、例题、代码实验" />
          </label>
          <label>
            薄弱点
            <input id="weakPoints" value="信号量、死锁检测、页面置换算法" />
          </label>
          <label>
            可用时间
            <input id="availableTime" value="每天 45 分钟" />
          </label>
        </div>
      </section>

      <section class="panel resources">
        <h2>资源类型</h2>
        <div class="checks">
          <label><input type="checkbox" value="lecture_note" checked />课程讲解</label>
          <label><input type="checkbox" value="concept_map" checked />思维导图</label>
          <label><input type="checkbox" value="exercises" checked />练习题库</label>
          <label><input type="checkbox" value="extended_reading" />拓展阅读</label>
          <label><input type="checkbox" value="case_project" checked />实操案例</label>
          <label><input type="checkbox" value="video_script" checked />视频脚本</label>
        </div>
        <button class="primary" id="generateBtn">生成资源包</button>
      </section>

      <section class="panel search">
        <h2>教材检索</h2>
        <div class="searchbar">
          <input id="query" value="死锁的必要条件" />
          <button id="searchBtn">检索</button>
        </div>
        <div id="searchResults"></div>
      </section>

      <section class="output">
        <div class="outputHead">
          <h2>生成结果</h2>
          <button id="copyBtn">复制 Markdown</button>
        </div>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
