<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRLMAD — 个性化学习资源多智能体系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fbf1ed', 100: '#f5dfd7', 200: '#ebc2b3', 300: '#dfa18b', 400: '#d4876c', 500: '#cc785c', 600: '#b96449', 700: '#a9583e', 800: '#864735', 900: '#6d3c30' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600&display=swap');
        :root {
            --canvas: #faf9f5; --surface-soft: #f5f0e8; --surface-card: #efe9de;
            --hairline: #e6dfd8; --ink: #141413; --body: #3d3d3a;
            --muted: #6c6a64; --muted-soft: #8e8b82; --coral: #cc785c;
            --coral-active: #a9583e; --dark: #181715; --success: #5db872;
        }
        * { font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { color: var(--body); }
        .display-title, main h1, main h2 { font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif; font-weight: 500 !important; letter-spacing: -0.02em; color: var(--ink); }
        .markdown-body { color: var(--body); }
        .markdown-body h1 { font-family: 'Noto Serif SC', Georgia, serif; font-size: 1.5rem; font-weight: 500; margin-top: 1.25rem; margin-bottom: 0.75rem; color: var(--ink); }
        .markdown-body h2 { font-family: 'Noto Serif SC', Georgia, serif; font-size: 1.2rem; font-weight: 500; margin-top: 1rem; margin-bottom: 0.5rem; color: #252523; border-bottom: 1px solid var(--hairline); padding-bottom: 0.35rem; }
        .markdown-body h3 { font-size: 1.05rem; font-weight: 500; margin-top: 0.75rem; margin-bottom: 0.25rem; color: var(--body); }
        .markdown-body p { margin-bottom: 0.5rem; line-height: 1.75; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-body li { margin-bottom: 0.2rem; line-height: 1.6; }
        .markdown-body code { background: var(--surface-card); padding: 0.1rem 0.35rem; border-radius: 0.25rem; font-size: 0.85rem; color: var(--coral-active); }
        .markdown-body pre { background: var(--dark); color: var(--canvas); padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.75rem 0; }
        .markdown-body pre code { background: transparent; padding: 0; color: inherit; font-size: 0.85rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--hairline); padding: 0.5rem 0.75rem; text-align: left; }
        .markdown-body th { background: var(--surface-soft); font-weight: 600; color: var(--body); }
        .markdown-body blockquote { border-left: 3px solid var(--coral); padding-left: 1rem; color: var(--muted); margin: 0.5rem 0; background: var(--surface-soft); padding: 0.5rem 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        .typing::after { content: ' ▌'; animation: blink 1s step-end infinite; color: var(--coral); }
        @keyframes blink { 50% { opacity: 0; } }
        .slide-up { animation: slideUp 0.35s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .app-shell { background: var(--canvas); }
        .glass-panel { background: rgba(250,249,245,0.96); backdrop-filter: blur(16px); }
        .surface, .soft-card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: 0.75rem; box-shadow: none; }
        .nav-glyph {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.45rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-card);
            color: var(--coral-active);
            font-size: 0.65rem;
            font-weight: 700;
        }
        .label-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.75rem;
            height: 1.5rem;
            border-radius: 0.45rem;
            background: var(--surface-card);
            color: var(--body);
            font-size: 0.68rem;
            font-weight: 700;
        }
        .empty-mark {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-card);
            color: var(--coral);
            font-size: 1.2rem;
            font-weight: 800;
            opacity: 0.75;
        }
        .nav-link { transition: all 0.2s ease; border-radius: 0.75rem; }
        .nav-link:hover { background: var(--surface-soft); }
        .nav-link.active { background: var(--surface-card); color: var(--ink); font-weight: 600; box-shadow: inset 3px 0 0 var(--coral); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .gradient-brand { background: var(--coral); }
        .gradient-card { background: var(--surface-soft); }
        .rounded-2xl { border-radius: 0.75rem !important; }
        .rounded-xl { border-radius: 0.625rem !important; }
        button, input, textarea, select { letter-spacing: 0; }
        button { transform: translateZ(0); }
        button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
            outline: 2px solid var(--coral);
            outline-offset: 2px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .step-indicator { position: relative; }
        .step-indicator::before { content: ''; position: absolute; left: 11px; top: 24px; bottom: 4px; width: 2px; background: var(--hairline); }
        .step-indicator.completed::before { background: var(--coral); }

        /* Warm editorial normalization for existing Tailwind-authored views. */
        main .bg-white, main .bg-white\/90 { background-color: var(--canvas) !important; }
        main .bg-gray-50, main .bg-slate-50 { background-color: var(--surface-soft) !important; }
        main .border-gray-100, main .border-gray-200, main .border-slate-100, main .border-slate-200 { border-color: var(--hairline) !important; }
        main .text-gray-800, main .text-gray-900, main .text-slate-800 { color: var(--ink) !important; }
        main .text-gray-700, main .text-slate-700 { color: var(--body) !important; }
        main .text-gray-400, main .text-gray-500, main .text-gray-600 { color: var(--muted) !important; }
        main .shadow-sm, main .shadow-md, main .shadow-lg, main .shadow-xl { box-shadow: none !important; }
        main button[class*="bg-gradient"], main button.gradient-brand { background: var(--coral) !important; }
        main button[class*="bg-gradient"]:hover, main button.gradient-brand:hover { background: var(--coral-active) !important; }
        main > [x-data] > div:first-child { background: rgba(250,249,245,0.96) !important; border-color: var(--hairline) !important; min-height: 64px; }
        .page-emblem { background: var(--dark) !important; color: var(--canvas) !important; box-shadow: none !important; }
        .mobile-header { display: none; }
        @media (max-width: 767px) {
            .app-frame { flex-direction: column; }
            .app-sidebar { display: none !important; }
            .mobile-header { display: flex !important; min-height: 108px; background: var(--canvas); border-bottom: 1px solid var(--hairline); }
            .app-main { height: calc(100vh - 108px); width: 100%; }
            .mobile-nav { scrollbar-width: none; }
            .mobile-nav::-webkit-scrollbar { display: none; }
            .mobile-nav a { white-space: nowrap; border: 1px solid transparent; }
            .mobile-nav a.active { background: var(--surface-card); border-color: var(--hairline); color: var(--ink); }
            main > [x-data] > div:first-child { padding-left: 1rem !important; padding-right: 1rem !important; }
        }
    </style>
</head>
<body class="app-shell min-h-screen text-slate-800" data-page="{{ page }}" x-data x-init="Alpine.store('app').init()">
    <div class="app-frame flex h-screen overflow-hidden">
        <header class="mobile-header flex-wrap items-center gap-x-3 px-4 py-3 flex-shrink-0">
            <div class="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center text-white font-semibold">P</div>
            <div class="min-w-0">
                <p class="display-title text-lg leading-none">PRLMAD</p>
                <p class="text-[10px] text-gray-500 mt-1 truncate" x-text="$store.app.currentSession ? $store.app.currentSession.name : '个性化学习工作台'"></p>
            </div>
            <select class="ml-auto max-w-[45%] text-xs border border-[#e6dfd8] rounded-lg px-2 py-2 bg-transparent" :value="$store.app.currentSessionId" @change="$store.app.switchSession($event.target.value)">
                <option value="">选择会话</option>
                <template x-for="s in $store.app.sessions" :key="s.session_id"><option :value="s.session_id" x-text="s.name"></option></template>
            </select>
            <nav class="mobile-nav w-full flex items-center gap-1 overflow-x-auto pt-2 text-xs text-gray-600">
                <a href="/page/chat" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'chat' }">画像</a>
                <a href="/page/generate" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'generate' }">资源</a>
                <a href="/page/learning-path" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'learning_path' }">路径</a>
                <a href="/page/tutor" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'tutor' }">辅导</a>
                <a href="/page/evaluate" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'evaluate' }">评估</a>
                <a href="/page/knowledge" class="px-3 py-1.5 rounded-lg" :class="{ 'active': '{{ page }}' === 'knowledge' }">知识库</a>
            </nav>
        </header>
        <!-- Sidebar -->
        <aside class="app-sidebar w-64 glass-panel border-r border-gray-100 flex flex-col flex-shrink-0 z-10">
            <div class="p-5 border-b border-gray-100">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center text-white font-semibold text-sm">P</div>
                    <div>
                        <h1 class="display-title text-xl text-gray-800">PRLMAD</h1>
                        <p class="text-[10px] text-gray-400 mt-0.5">多智能体学习系统</p>
                    </div>
                </div>
            </div>

            <!-- Session Selector -->
            <div class="px-3 py-3 border-b border-gray-100">
                <label class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider mb-1.5 block">当前会话</label>
                <select :value="$store.app.currentSessionId" @change="$store.app.switchSession($event.target.value)"
                    x-show="$store.app.sessions.length > 0"
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-brand-400 focus:border-transparent outline-none text-gray-700">
                    <template x-for="s in $store.app.sessions" :key="s.session_id">
                        <option :value="s.session_id" x-text="s.name + ' (' + s.course + ')'"></option>
                    </template>
                </select>
                <p x-show="$store.app.sessions.length === 0" class="text-xs text-gray-400 italic">暂无学习会话</p>
                <div x-show="$store.app.sessions.length > 0" class="mt-2 grid grid-cols-2 gap-2">
                    <button @click="$store.app.renameCurrentSession()"
                        class="text-xs bg-gray-50 text-gray-600 hover:bg-gray-100 rounded-lg px-3 py-2 transition-all font-medium border border-gray-200">
                        重命名
                    </button>
                    <button @click="$store.app.deleteCurrentSession()"
                        class="text-xs bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg px-3 py-2 transition-all font-medium border border-rose-100">
                        删除会话
                    </button>
                </div>
                <button @click="$store.app.createSessionPrompt()"
                    class="mt-2 w-full text-xs bg-brand-50 text-brand-600 hover:bg-brand-100 rounded-lg px-3 py-2 transition-all font-medium border border-brand-100 hover:border-brand-200">
                    + 新建学习会话
                </button>
                <p x-show="$store.app.sessions.length > 0" class="mt-2 text-[10px] leading-relaxed text-gray-400">
                    建议先完善画像，再生成资源、规划路径和进行评估。
                </p>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 py-3 space-y-0.5 overflow-y-auto">
                <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider mb-2 px-3">功能导航</p>
                <a :href="'/page/chat' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-600"
                    :class="{ 'active': '{{ page }}' === 'chat' }">
                    <span class="nav-glyph">像</span> 学习画像
                    <span x-show="$store.app.profileDimensions.length > 0" class="ml-auto w-1.5 h-1.5 rounded-full bg-green-400"></span>
                    <span x-show="$store.app.profileDimensions.length === 0 && '{{ page }}' === 'chat'" class="ml-auto text-[10px] text-orange-400 bg-orange-50 px-1.5 py-0.5 rounded-full">待完善</span>
                </a>
                <a :href="'/page/generate' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-600"
                    :class="{ 'active': '{{ page }}' === 'generate' }">
                    <span class="nav-glyph">资</span> 资源生成
                </a>
                <a :href="'/page/learning-path' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-600"
                    :class="{ 'active': '{{ page }}' === 'learning_path' }">
                    <span class="nav-glyph">路</span> 学习路径
                </a>
                <a :href="'/page/tutor' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-600"
                    :class="{ 'active': '{{ page }}' === 'tutor' }">
                    <span class="nav-glyph">辅</span> 智能辅导
                </a>
                <a :href="'/page/evaluate' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-600"
                    :class="{ 'active': '{{ page }}' === 'evaluate' }">
                    <span class="nav-glyph">评</span> 效果评估
                </a>
                <div class="my-2 border-t border-gray-100"></div>
                <a :href="'/page/knowledge' + ($store.app.currentSessionId ? '#' + $store.app.currentSessionId : '')" @click="$store.app.confirmNavigation($event)" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-gray-400"
                    :class="{ 'active': '{{ page }}' === 'knowledge' }">
                    <span class="nav-glyph">库</span> 知识库管理
                </a>
            </nav>

            <!-- Profile Preview -->
            <div class="p-3 border-t border-gray-100">
                <div x-show="$store.app.profileDimensions.length > 0" class="bg-gradient-to-br from-brand-50 to-purple-50 rounded-xl p-3 text-xs border border-brand-100">
                    <div class="flex items-center gap-1.5 mb-2">
                        <p class="font-semibold text-brand-800">学习画像</p>
                        <span class="ml-auto text-[10px] bg-brand-200 text-brand-700 px-1.5 py-0.5 rounded-full" x-text="$store.app.profileDimensions.length + '维'"></span>
                    </div>
                    <div class="space-y-1">
                        <template x-for="dim in $store.app.profileDimensions.slice(0, 5)" :key="dim.label">
                            <div class="flex items-start gap-1.5 text-brand-700">
                                <span class="mt-0.5 w-1.5 h-1.5 rounded-full bg-brand-400 flex-shrink-0"></span>
                                <span class="leading-relaxed"><span class="font-medium" x-text="dim.label"></span>: <span x-text="dim.value"></span></span>
                            </div>
                        </template>
                    </div>
                </div>
                <div x-show="$store.app.profileDimensions.length === 0 && $store.app.sessions.length > 0" class="text-center py-3">
                    <p class="text-xs text-gray-400">开始对话以构建画像</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="app-main flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
