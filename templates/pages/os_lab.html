{% extends "base.html" %}
{% block content %}
<style>
    .os-lab {
        --ink: #171512;
        --body: #3f3b35;
        --muted: #716c63;
        --line: #e5ded3;
        --paper: #fbfaf6;
        --soft: #f4efe7;
        --blue: #1769d8;
        --blue-soft: #eaf2ff;
        --green: #35835a;
        --amber: #a87524;
        min-height: 100%;
        color: var(--body);
    }
    .os-lab *, .os-lab *::before, .os-lab *::after {
        animation: none !important;
        transition: none !important;
    }
    .login-screen {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
            linear-gradient(rgba(23,21,18,.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(23,21,18,.035) 1px, transparent 1px),
            #f7f3ea;
        background-size: 32px 32px;
    }
    .login-card {
        width: min(100%, 31rem);
        border: 1px solid rgba(23,21,18,.13);
        border-radius: 1rem;
        background: rgba(251,250,246,.96);
        box-shadow: 0 18px 48px rgba(67,56,45,.14);
        padding: 2rem;
    }
    .login-logo {
        width: 4rem;
        height: 4rem;
        margin: 0 auto;
        display: grid;
        place-items: center;
        border-radius: 1.1rem;
        background: var(--ink);
        color: #fffaf2;
        font-weight: 800;
    }
    .login-input {
        width: 100%;
        height: 2.85rem;
        margin-top: .4rem;
        border: 1px solid #ded6cb;
        border-radius: .7rem;
        background: #fffdf9;
        padding: 0 .9rem;
        color: #1f2937;
        outline: none;
    }
    .login-input:focus {
        border-color: #b96449;
        box-shadow: 0 0 0 3px rgba(185,100,73,.12);
    }
    .login-submit {
        width: 100%;
        height: 2.9rem;
        border-radius: .7rem;
        border: 1px solid #171512;
        background: #171512 !important;
        color: #fffaf2 !important;
        font-size: .94rem;
        font-weight: 800;
    }
    .desktop {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        background:
            linear-gradient(rgba(23,21,18,.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(23,21,18,.03) 1px, transparent 1px),
            #faf9f5;
        background-size: 30px 30px;
    }
    .desktop-bar {
        min-height: 4.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: .85rem 1.5rem;
        border-bottom: 1px solid var(--line);
        background: rgba(251,250,246,.96);
    }
    .os-mark, .card-mark {
        display: inline-grid;
        place-items: center;
        width: 2.35rem;
        height: 2.35rem;
        border-radius: .7rem;
        background: var(--soft);
        color: #a9583e;
        font-weight: 800;
        border: 1px solid rgba(185,100,73,.16);
    }
    .workspace {
        width: min(100%, 86rem);
        margin: 0 auto;
        padding: 1.25rem;
    }
    .desktop-strip, .algo-card, .stage {
        border: 1px solid var(--line);
        border-radius: .8rem;
        background: rgba(251,250,246,.9);
    }
    .algo-card {
        min-height: 10rem;
        text-align: left;
        padding: 1.15rem;
    }
    .algo-card:hover {
        border-color: rgba(185,100,73,.38);
        background: #fffdf8;
    }
    .toolbar-btn {
        border-radius: .65rem;
        padding: .55rem .8rem;
        font-size: .76rem;
        border: 1px solid var(--line);
        background: #fffdf9;
        color: var(--body);
        font-weight: 700;
    }
    .toolbar-btn.dark {
        background: #171512;
        border-color: #171512;
        color: #fffaf2;
    }
    .toolbar-btn.good {
        background: #eaf7ef;
        border-color: #cce9d5;
        color: #246844;
    }
    .stage-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem;
        border-bottom: 1px solid var(--line);
    }
    .progress-track {
        height: .55rem;
        border-radius: 999px;
        background: #eee7dc;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        background: #171512;
    }
    .experiment-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(22rem, .75fr);
        min-height: 34rem;
    }
    .visual-side {
        min-width: 0;
        padding: 1rem;
        border-right: 1px solid var(--line);
    }
    .code-side {
        min-width: 0;
        background: #fffdf9;
    }
    .panel-title {
        height: 2.8rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .75rem;
        padding: 0 .9rem;
        border-bottom: 1px solid var(--line);
        background: rgba(244,239,231,.75);
        font-size: .78rem;
        font-weight: 800;
        color: var(--body);
    }
    .visual-canvas {
        min-height: 28rem;
        padding-top: 1rem;
    }
    .code-pre {
        margin: 0;
        max-height: 35rem;
        overflow: auto;
        padding: 1rem 1.1rem;
        color: #37332d;
        font-size: .78rem;
        line-height: 1.72;
        white-space: pre-wrap;
        tab-size: 4;
    }
    .flow-grid {
        display: grid;
        grid-template-columns: minmax(0,1fr) 4rem minmax(0,1fr) 4rem minmax(0,1fr);
        gap: .75rem;
        align-items: center;
    }
    .flow-line {
        height: 3px;
        background: #74a989;
        position: relative;
        border-radius: 999px;
    }
    .flow-line::after {
        content: "";
        position: absolute;
        right: -1px;
        top: 50%;
        width: .45rem;
        height: .45rem;
        border-top: 2px solid #4b8a62;
        border-right: 2px solid #4b8a62;
        transform: translateY(-50%) rotate(45deg);
    }
    .mini-card {
        border: 1px solid var(--line);
        border-radius: .75rem;
        background: #fffdf9;
        padding: 1rem;
    }
    .state-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.2rem;
        min-height: 2rem;
        border-radius: .55rem;
        border: 1px solid #cbdff8;
        background: var(--blue-soft);
        color: #1558ad;
        font-size: .78rem;
        font-weight: 800;
        padding: .25rem .55rem;
    }
    .gantt-card {
        border: 1px solid #ddd5c9;
        border-radius: .75rem;
        background: #fffdf9;
        padding: 1rem;
    }
    .gantt-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
    }
    .gantt-kicker {
        color: var(--muted);
        font-size: .68rem;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
    }
    .gantt-status {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        color: #5d574f;
        font-size: .7rem;
        font-weight: 700;
        white-space: nowrap;
    }
    .gantt-status::before {
        content: "";
        width: .45rem;
        height: .45rem;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(53,131,90,.12);
    }
    .gantt-scroll {
        overflow-x: auto;
        padding: .25rem .1rem .35rem;
        scrollbar-width: thin;
        scrollbar-color: #c9c0b4 transparent;
    }
    .gantt-timeline {
        position: relative;
        min-width: calc(var(--gantt-columns) * 3.4rem);
    }
    .gantt-grid,
    .gantt-bars,
    .gantt-axis {
        display: grid;
        grid-template-columns: repeat(var(--gantt-columns), minmax(3.4rem, 1fr));
    }
    .gantt-grid {
        height: 4rem;
        border: 1px solid #d9d1c5;
        border-radius: .45rem;
        overflow: hidden;
        background: #f7f3ec;
    }
    .gantt-cell {
        border-right: 1px dashed #d6cec2;
        background: linear-gradient(180deg, rgba(255,255,255,.7), rgba(244,239,231,.55));
    }
    .gantt-cell:last-child {
        border-right: 0;
    }
    .gantt-bars {
        position: absolute;
        inset: 0;
        height: 4rem;
        pointer-events: none;
    }
    .gantt-segment {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        margin: .35rem 0;
        border-right: 1px solid rgba(255,255,255,.7);
        color: #fff;
        font-size: .78rem;
        font-weight: 800;
        box-shadow: inset 0 -2px 0 rgba(0,0,0,.1);
    }
    .gantt-segment:first-child {
        border-radius: .28rem 0 0 .28rem;
    }
    .gantt-segment:last-child {
        border-radius: 0 .28rem .28rem 0;
        border-right: 0;
    }
    .gantt-segment.is-active::after {
        content: "";
        position: absolute;
        inset: -.28rem;
        border: 2px solid #171512;
        border-radius: .45rem;
    }
    .gantt-segment small {
        margin-left: .35rem;
        color: rgba(255,255,255,.78);
        font-size: .62rem;
        font-weight: 700;
    }
    .gantt-tone-0 { background: #216869; }
    .gantt-tone-1 { background: #b95f42; }
    .gantt-tone-2 { background: #3867a6; }
    .gantt-tone-3 { background: #8a6a2f; }
    .gantt-tone-4 { background: #72558a; }
    .gantt-axis {
        position: relative;
        height: 1.55rem;
        color: #777066;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .65rem;
    }
    .gantt-tick {
        position: relative;
        padding-top: .38rem;
    }
    .gantt-tick::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: .3rem;
        background: #a9a095;
    }
    .gantt-end-tick {
        position: absolute;
        right: 0;
        bottom: 0;
        transform: translateX(50%);
    }
    .gantt-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #8a8379;
        font-size: .72rem;
        font-weight: 700;
    }
    .memory-row {
        height: 6rem;
        display: flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: .75rem;
        background: #fffdf9;
    }
    .memory-seg {
        min-width: 2.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        border-right: 1px solid rgba(255,255,255,.8);
        font-size: .7rem;
        font-weight: 800;
    }
    @media (max-width: 1100px) {
        .experiment-grid {
            grid-template-columns: 1fr;
        }
        .visual-side {
            border-right: 0;
            border-bottom: 1px solid var(--line);
        }
        .code-pre {
            max-height: 24rem;
        }
    }
    @media (max-width: 760px) {
        .desktop-bar {
            align-items: flex-start;
            flex-direction: column;
        }
        .flow-grid {
            grid-template-columns: 1fr;
        }
        .flow-line {
            width: 3px;
            height: 2rem;
            justify-self: center;
        }
        .flow-line::after {
            right: auto;
            bottom: -1px;
            top: auto;
            left: 50%;
            transform: translateX(-50%) rotate(135deg);
        }
    }
</style>

<div x-data="osAlgorithmLab" class="os-lab">
    <div class="desktop">
        <div class="desktop-bar">
            <div class="flex items-center gap-3 min-w-0">
                <div class="os-mark">OS</div>
                <div class="min-w-0">
                    <h2 class="text-base font-semibold text-gray-900">透明操作系统桌面</h2>
                    <p class="text-xs text-gray-500 truncate"
                        x-text="$store.app.currentSession ? '当前会话：' + $store.app.currentSession.name + '，实验进度将写入评估' : '未选择学习会话：可演示，但不会记录实验进度'"></p>
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <template x-if="selected">
                    <button @click="backToCards()" class="toolbar-btn">返回卡片</button>
                </template>
                <template x-if="selected">
                    <button @click="toggleRun()" class="toolbar-btn good" x-text="running ? '暂停播放' : '播放步骤'"></button>
                </template>
                <template x-if="selected">
                    <button @click="nextFrame()" class="toolbar-btn dark">单步</button>
                </template>
                <button @click="resetLab()" class="toolbar-btn">清空状态</button>
            </div>
        </div>

        <div class="workspace">
            <div x-show="!selected" class="space-y-5">
                <div class="desktop-strip p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                    <div>
                        <p class="text-sm font-semibold text-gray-900">算法实验桌面</p>
                        <p class="mt-1 text-xs text-gray-500">覆盖进程调度、内存分配、页面置换、同步与死锁。点击具体算法进入实验窗口。</p>
                    </div>
                    <div class="flex flex-wrap gap-2 text-[11px] text-gray-500">
                        <span class="rounded-lg bg-white border border-gray-100 px-2 py-1">CPU: 空闲</span>
                        <span class="rounded-lg bg-white border border-gray-100 px-2 py-1">内存: 824MB 可用</span>
                        <span class="rounded-lg bg-white border border-gray-100 px-2 py-1">模式: 实验桌面</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    <template x-for="item in algorithms" :key="item.id">
                        <button @click="openAlgorithm(item.id)" class="algo-card">
                            <div class="flex items-start justify-between gap-4">
                                <div>
                                    <span class="card-mark" x-text="item.mark"></span>
                                    <h3 class="mt-4 text-base font-semibold text-gray-900" x-text="item.title"></h3>
                                    <p class="mt-2 text-xs leading-relaxed text-gray-500" x-text="item.desc"></p>
                                </div>
                                <span class="text-[11px] text-gray-400" x-text="item.tag"></span>
                            </div>
                            <div class="mt-5 flex flex-wrap gap-2">
                                <template x-for="point in item.points" :key="point">
                                    <span class="rounded-lg bg-gray-50 border border-gray-100 px-2 py-1 text-[11px] text-gray-500" x-text="point"></span>
                                </template>
                            </div>
                        </button>
                    </template>
                </div>
            </div>

            <div x-show="selected" x-cloak>
                <section class="stage">
                    <div class="stage-head">
                        <div class="flex items-center gap-3">
                            <span class="card-mark" x-text="current.mark"></span>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900" x-text="current.title"></h3>
                                <p class="text-xs text-gray-500 mt-1" x-text="current.desc"></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="rounded-lg bg-gray-100 px-2 py-1 text-xs font-bold text-gray-700" x-text="(frameIndex + 1) + '/' + current.frames.length"></span>
                            <button @click="resetAnimation()" class="toolbar-btn">重播</button>
                        </div>
                    </div>

                    <div class="px-4 pt-4">
                        <div class="progress-track">
                            <div class="progress-fill" :style="'width:' + progress + '%'"></div>
                        </div>
                    </div>

                    <div class="experiment-grid">
                        <div class="visual-side">
                            <div class="panel-title">
                                <span>动态展示</span>
                                <span x-text="frame.note || frame.action || '观察当前步骤'"></span>
                            </div>
                            <div class="visual-canvas">
                                <template x-if="current.kind === 'schedule'">
                                    <div class="space-y-5">
                                        <div class="flow-grid">
                                            <div class="mini-card min-h-32">
                                                <div class="flex items-center justify-between mb-3">
                                                    <p class="text-xs font-semibold text-gray-700">就绪队列</p>
                                                    <span class="text-xs text-gray-400" x-text="frame.ready.length + ' 个'"></span>
                                                </div>
                                                <div class="flex flex-wrap gap-2">
                                                    <template x-for="proc in frame.ready" :key="proc">
                                                        <span class="state-pill" x-text="proc"></span>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="flow-line"></div>
                                            <div class="mini-card min-h-36 flex flex-col items-center justify-center bg-emerald-50">
                                                <p class="text-xs text-emerald-700 font-semibold">CPU 核心</p>
                                                <p class="mt-2 text-3xl font-bold text-gray-900" x-text="frame.cpu || '空闲'"></p>
                                                <p class="mt-1 text-xs text-gray-500 text-center" x-text="frame.note"></p>
                                            </div>
                                            <div class="flow-line"></div>
                                            <div class="mini-card min-h-32">
                                                <div class="flex items-center justify-between mb-3">
                                                    <p class="text-xs font-semibold text-gray-700">完成队列</p>
                                                    <span class="text-xs text-gray-400" x-text="frame.done.length + ' 个'"></span>
                                                </div>
                                                <div class="flex flex-wrap gap-2">
                                                    <template x-for="proc in frame.done" :key="proc">
                                                        <span class="state-pill bg-emerald-50 border-emerald-100 text-emerald-700" x-text="proc"></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="gantt-card">
                                            <div class="gantt-head">
                                                <div>
                                                    <p class="gantt-kicker">CPU Timeline</p>
                                                    <p class="mt-1 text-sm font-semibold text-gray-900">进程调度甘特图</p>
                                                </div>
                                                <span class="gantt-status" x-text="frame.cpu ? '正在执行 ' + frame.cpu : (ganttSegments.length ? '当前步骤已结束' : '等待调度')"></span>
                                            </div>
                                            <div class="gantt-scroll">
                                                <div class="gantt-timeline" :style="'--gantt-columns:' + ganttCapacity">
                                                    <div class="gantt-grid" aria-hidden="true">
                                                        <template x-for="cell in ganttCapacity" :key="cell">
                                                            <div class="gantt-cell"></div>
                                                        </template>
                                                    </div>
                                                    <div class="gantt-bars">
                                                        <template x-for="segment in ganttSegments" :key="segment.start + '-' + segment.label">
                                                            <div class="gantt-segment"
                                                                :class="['gantt-tone-' + segment.tone, segment.active ? 'is-active' : '']"
                                                                :style="'grid-column:' + (segment.start + 1) + ' / span ' + segment.duration"
                                                                :title="segment.label + '：' + segment.start + ' → ' + segment.end">
                                                                <span x-text="segment.label"></span>
                                                                <small x-show="segment.duration > 1" x-text="segment.duration + 't'"></small>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div x-show="!ganttSegments.length" class="gantt-empty">尚未分配 CPU 时间</div>
                                                    <div class="gantt-axis" aria-label="时间刻度">
                                                        <template x-for="tick in ganttCapacity" :key="tick">
                                                            <span class="gantt-tick" x-text="tick - 1"></span>
                                                        </template>
                                                        <span class="gantt-end-tick" x-text="ganttCapacity"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'memory'">
                                    <div class="space-y-5">
                                        <div class="mini-card">
                                            <div class="flex items-center justify-between mb-3">
                                                <p class="text-xs font-semibold text-gray-700">动态分区内存</p>
                                                <span class="text-xs text-gray-500" x-text="frame.action"></span>
                                            </div>
                                            <div class="memory-row">
                                                <template x-for="seg in frame.segments" :key="seg.label + seg.size + seg.type">
                                                    <div class="memory-seg"
                                                        :class="seg.type === 'free' ? 'bg-gray-100 text-gray-500' : (seg.type === 'hit' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800')"
                                                        :style="'width:' + seg.size + '%'">
                                                        <span x-text="seg.label"></span>
                                                        <span x-text="seg.size + '%'"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3">
                                            <template x-for="metric in frame.metrics" :key="metric.label">
                                                <div class="mini-card">
                                                    <p class="text-xs text-gray-500" x-text="metric.label"></p>
                                                    <p class="mt-1 text-xl font-bold text-gray-900" x-text="metric.value"></p>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'page'">
                                    <div class="space-y-5">
                                        <div class="mini-card">
                                            <p class="text-xs font-semibold text-gray-700 mb-3">页面访问串</p>
                                            <div class="grid grid-cols-10 gap-1">
                                                <template x-for="(page, index) in current.reference" :key="index">
                                                    <div class="h-10 rounded-lg border text-xs flex items-center justify-center"
                                                        :class="index === frame.pointer ? 'bg-gray-900 text-white border-gray-900' : 'bg-white border-gray-100 text-gray-500'"
                                                        x-text="page"></div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3">
                                            <template x-for="(block, index) in frame.blocks" :key="index">
                                                <div class="mini-card text-center">
                                                    <p class="text-xs text-gray-500 mb-2" x-text="'物理块 ' + (index + 1)"></p>
                                                    <div class="h-16 rounded-xl flex items-center justify-center text-2xl font-bold"
                                                        :class="frame.changed === index ? 'bg-amber-100 text-amber-800' : 'bg-blue-50 text-blue-700'"

                                    </div>

                                                    x-text="frame.producer"></div>
                                            </div>
                                            <div class="mini-card text-center">
                                                <p class="text-xs text-gray-500 mb-2">消费者线程</p>
                                                <div class="h-16 rounded-xl flex items-center justify-center text-lg font-bold"
                                                    :class="frame.consumer === '运行' ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-gray-500'"
                                                    x-text="frame.consumer"></div>
                                            </div>
                                        </div>

                                                        :class="cell ? 'bg-blue-100 border-blue-200 text-blue-800' : 'bg-white border-gray-100 text-gray-300'"
                                                        x-text="cell || '-'"></div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3">
                                            <template x-for="sem in frame.semaphores" :key="sem.label">
                                                <div class="mini-card">
                                                    <p class="text-xs text-gray-500" x-text="sem.label"></p>
                                                    <p class="mt-1 text-xl font-bold text-gray-900" x-text="sem.value"></p>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'deadlock'">
                                    <div class="space-y-5">
                                        <div class="grid grid-cols-3 gap-4">
                                            <template x-for="proc in frame.processes" :key="proc.name">
                                                <div class="mini-card">
                                                    <p class="text-sm font-semibold text-gray-800" x-text="proc.name"></p>
                                                    <p class="mt-2 text-xs text-gray-500">已分配</p>
                                                    <p class="text-lg font-bold text-gray-900" x-text="proc.allocated"></p>
                                                    <p class="mt-2 text-xs text-gray-500">还需要</p>
                                                    <p class="text-lg font-bold" :class="proc.safe ? 'text-emerald-700' : 'text-rose-700'" x-text="proc.need"></p>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="mini-card">
                                            <p class="text-xs text-gray-500">安全序列</p>
                                            <p class="mt-2 text-2xl font-bold text-gray-900" x-text="frame.sequence"></p>
                                            <p class="mt-2 text-xs text-gray-500" x-text="frame.note"></p>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <aside class="code-side">
                            <div class="panel-title">
                                <span>对应代码</span>
                                <span x-text="current.codeLang"></span>
                            </div>
                            <pre class="code-pre" x-text="current.code"></pre>
                        </aside>
                    </div>
                </section>
            </div>
        </div>
    </div>

{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('osAlgorithmLab', () => ({
        selected: '',
        frameIndex: 0,
        running: false,
        timer: null,
        maxFrameReached: 0,
        completedAlgorithms: {},
        algorithms: [
            { id: 'fcfs', mark: '先', title: 'FCFS 先来先服务', tag: '调度', desc: '按到达顺序依次占用 CPU，非抢占式。', points: ['到达队列', '非抢占', '平均等待'] },
            { id: 'sjf', mark: '短', title: 'SJF 短作业优先', tag: '调度', desc: '优先执行估计运行时间最短的进程。', points: ['最短运行', '非抢占', '等待时间'] },
            { id: 'rr', mark: '轮', title: 'RR 时间片轮转', tag: '调度', desc: '每个进程获得固定时间片，用完回到队尾。', points: ['时间片', '抢占', '甘特图'] },
            { id: 'priority', mark: '优', title: '优先级调度', tag: '调度', desc: '根据优先级选择进程，可观察饥饿风险。', points: ['优先级', '老化', '饥饿'] },
            { id: 'firstFit', mark: '首', title: '首次适应分配', tag: '内存', desc: '从低地址开始扫描，命中第一个足够大的空闲区。', points: ['低地址扫描', '切分', '外部碎片'] },
            { id: 'bestFit', mark: '佳', title: '最佳适应分配', tag: '内存', desc: '选择满足请求且剩余空间最小的空闲区。', points: ['最小剩余', '空闲表', '碎片'] },
            { id: 'worstFit', mark: '大', title: '最坏适应分配', tag: '内存', desc: '选择最大的空闲区，尽量留下较大的剩余块。', points: ['最大空闲块', '切分', '再分配'] },
            { id: 'fifoPage', mark: 'F', title: 'FIFO 页面置换', tag: '页面', desc: '淘汰最早进入内存的页面。', points: ['先进先出', '队列', '缺页'] },
            { id: 'lruPage', mark: 'L', title: 'LRU 页面置换', tag: '页面', desc: '淘汰最近最久未访问的页面。', points: ['访问历史', '最近最久', '缺页'] },
            { id: 'optPage', mark: 'O', title: 'OPT 最佳置换', tag: '页面', desc: '淘汰未来最长时间不会被访问的页面。', points: ['未来访问', '理论最优', '对照'] },
            { id: 'producerConsumer', mark: '线', title: '生产者消费者', tag: '同步', desc: '用 empty、full、mutex 协调共享缓冲区。', points: ['信号量', '临界区', '缓冲区'] },
            { id: 'banker', mark: '锁', title: '银行家算法', tag: '死锁', desc: '通过安全性检查判断资源分配是否会进入危险状态。', points: ['Need', 'Work', '安全序列'] },
        ],

        get current() {
            return this.scenarios()[this.selected] || this.scenarios().fcfs;
        },
        get frame() {
            return this.current.frames[this.frameIndex] || this.current.frames[0];
        },
        get progress() {
            const total = Math.max(1, this.current.frames.length - 1);
            return Math.round((this.frameIndex / total) * 100);
        },
        get ganttCapacity() {
            return Math.max(8, ...this.current.frames.map(item => (item.gantt || []).length));
        },
        get ganttSegments() {
            const slots = this.frame.gantt || [];
            const segments = [];
            slots.forEach((label, index) => {
                const previous = segments[segments.length - 1];
                if (previous && previous.label === label) {
                    previous.duration += 1;
                    previous.end += 1;
                    return;
                }
                const processNumber = Number(String(label).match(/\d+/)?.[0] || segments.length);
                segments.push({
                    label,
                    start: index,
                    end: index + 1,
                    duration: 1,
                    tone: processNumber % 5,
                    active: false,
                });
            });
            const latest = segments[segments.length - 1];
            if (latest && this.frame.cpu === latest.label) latest.active = true;
            return segments;
        },

        resetLab() {
            if (this.selected) this.logLabEvent('reset_lab');
            this.stopRun();
            this.selected = '';
            this.frameIndex = 0;
            this.maxFrameReached = 0;
        },
        openAlgorithm(id) {
            this.selected = id;
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.stopRun();
            this.logLabEvent('open_algorithm');
        },
        backToCards() {
            this.logLabEvent('back_to_cards', { max_frame_reached: this.maxFrameReached });
            this.stopRun();
            this.selected = '';
            this.frameIndex = 0;
            this.maxFrameReached = 0;
        },
        resetAnimation() {
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.stopRun();
            this.logLabEvent('reset_animation');
        },
        nextFrame() {
            const last = this.current.frames.length - 1;
            this.frameIndex = this.frameIndex >= last ? 0 : this.frameIndex + 1;
            this.maxFrameReached = Math.max(this.maxFrameReached, this.frameIndex);
            this.logLabEvent('step');
            if (this.frameIndex === last && !this.completedAlgorithms[this.selected]) {
                this.completedAlgorithms[this.selected] = true;
                this.logLabEvent('complete_algorithm');
            }
        },
        toggleRun() {
            this.running = !this.running;
            if (!this.running) {
                this.logLabEvent('pause_playback');
                this.stopRun();
                return;
            }
            this.logLabEvent('start_playback');
            this.timer = setInterval(() => this.nextFrame(), 2200);
        },
        stopRun() {
            if (this.timer) clearInterval(this.timer);
            this.timer = null;
            this.running = false;
        },
        async logLabEvent(eventType, metadata = {}) {
            const sid = Alpine.store('app')?.currentSessionId;
            if (!sid || !this.selected) return;
            const current = this.current;
            try {
                await fetch('/api/os-lab/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sid,
                        algorithm_id: this.selected,
                        algorithm_title: current.title,
                        event_type: eventType,
                        frame_index: this.frameIndex,
                        total_frames: current.frames.length,
                        metadata,
                    }),
                });
            } catch (error) {
                console.warn('Failed to record OS lab event', error);
            }
        },

                fcfs: {

while ready_queue is not empty:

                        { ready: ['P4'], cpu: 'P3', done: ['P1', 'P2'], gantt: ['P1', 'P1', 'P2', 'P3'], note: 'P3 运行，FCFS 不重新排序' },
                        { ready: [], cpu: 'P4', done: ['P1', 'P2', 'P3'], gantt: ['P1', 'P1', 'P2', 'P3', 'P4'], note: 'P4 最后运行' },
                        { ready: [], cpu: '', done: ['P1', 'P2', 'P3', 'P4'], gantt: ['P1', 'P1', 'P2', 'P3', 'P4', 'P4'], note: '所有进程按到达顺序完成' },

                        { ready: [], cpu: '', done: ['P4', 'P2', 'P3', 'P1'], gantt: ['P4', 'P2', 'P2', 'P3', 'P3', 'P1', 'P1'], note: '短作业平均等待时间较低，但长作业可能等待久' },
