{% extends "base.html" %}
{% block content %}
<style>
    .os-lab {
        --ink: #171512;
        --body: #3f3b35;
        --muted: #716c63;
        --line: #e5ded3;
        --paper: #fbfaf6;
        --soft: #f4efe7;
        --blue: #1769d8;
        --blue-soft: #eaf2ff;
        --green: #35835a;
        --amber: #a87524;
        min-height: 100%;
        color: var(--body);
    }
    body.os-lab-immersive {
        overflow: hidden;
    }
    body.os-lab-immersive .app-sidebar,
    body.os-lab-immersive .mobile-header {
        display: none !important;
    }
    body.os-lab-immersive .app-frame {
        height: 100dvh;
    }
    body.os-lab-immersive .app-main {
        overflow: hidden;
    }
    .os-lab.is-immersive {
        position: fixed;
        inset: 0;
        z-index: 120;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: #faf9f5;
    }
    .os-lab.is-immersive .desktop {
        width: 100%;
        height: 100dvh;
        min-height: 0;
        overflow: hidden;
    }
    .os-lab.is-immersive .desktop-bar {
        flex: 0 0 auto;
    }
    .os-lab.is-immersive .workspace {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        max-width: none;
        overflow: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
    }
    .os-lab.is-immersive .experiment-grid {
        min-height: calc(100dvh - 13rem);
    }
    .os-lab.is-immersive .code-pre {
        max-height: calc(100dvh - 16rem);
    }
    .os-lab *, .os-lab *::before, .os-lab *::after {
        animation: none !important;
        transition: none !important;
    }
    .login-screen {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
            linear-gradient(rgba(23,21,18,.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(23,21,18,.035) 1px, transparent 1px),
            #f7f3ea;
        background-size: 32px 32px;
    }
    .login-card {
        width: min(100%, 31rem);
        border: 1px solid rgba(23,21,18,.13);
        border-radius: 1rem;
        background: rgba(251,250,246,.96);
        box-shadow: 0 18px 48px rgba(67,56,45,.14);
        padding: 2rem;
    }
    .login-logo {
        width: 4rem;
        height: 4rem;
        margin: 0 auto;
        display: grid;
        place-items: center;
        border-radius: 1.1rem;
        background: var(--ink);
        color: #fffaf2;
        font-weight: 800;
    }
    .login-input {
        width: 100%;
        height: 2.85rem;
        margin-top: .4rem;
        border: 1px solid #ded6cb;
        border-radius: .7rem;
        background: #fffdf9;
        padding: 0 .9rem;
        color: #1f2937;
        outline: none;
    }
    .login-input:focus {
        border-color: #b96449;
        box-shadow: 0 0 0 3px rgba(185,100,73,.12);
    }
    .login-submit {
        width: 100%;
        height: 2.9rem;
        border-radius: .7rem;
        border: 1px solid #171512;
        background: #171512 !important;
        color: #fffaf2 !important;
        font-size: .94rem;
        font-weight: 800;
    }
    .desktop {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        background:
            linear-gradient(rgba(23,21,18,.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(23,21,18,.03) 1px, transparent 1px),
            #faf9f5;
        background-size: 30px 30px;
    }
    .desktop-bar {
        min-height: 4.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: .85rem 1.5rem;
        border-bottom: 1px solid var(--line);
        background: rgba(251,250,246,.96);
    }
    .os-mark, .card-mark {
        display: inline-grid;
        place-items: center;
        width: 2.35rem;
        height: 2.35rem;
        border-radius: .7rem;
        background: var(--soft);
        color: #a9583e;
        font-weight: 800;
        border: 1px solid rgba(185,100,73,.16);
    }
    .workspace {
        width: min(100%, 92rem);
        margin: 0 auto;
        padding: 1.5rem clamp(1rem, 3vw, 2rem) 3rem;
    }
    .algo-card {
        border: 1px solid var(--line);
        border-radius: .5rem;
        background: rgba(251,250,246,.9);
    }
    .desktop-strip {
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
    }
    .stage {
        border: 0;
        border-radius: 0;
        background: transparent;
    }
    .algo-card {
        min-height: 10rem;
        text-align: left;
        padding: 1.15rem;
    }
    .algo-card:hover {
        border-color: rgba(185,100,73,.38);
        background: #fffdf8;
    }
    .toolbar-btn {
        border-radius: .65rem;
        padding: .55rem .8rem;
        font-size: .76rem;
        border: 1px solid var(--line);
        background: #fffdf9;
        color: var(--body);
        font-weight: 700;
    }
    .toolbar-btn.dark {
        background: #171512;
        border-color: #171512;
        color: #fffaf2;
    }
    .toolbar-btn.good {
        background: #eaf7ef;
        border-color: #cce9d5;
        color: #246844;
    }
    .toolbar-step {
        min-width: 3.2rem;
        min-height: 2.15rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: .5rem;
        background: #f4efe7;
        color: #4f4942;
        padding: .45rem .65rem;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .72rem;
        font-weight: 800;
        white-space: nowrap;
    }
    .experiment-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .75rem;
        padding: .75rem 0;
        border-bottom: 1px solid var(--line);
        background: transparent;
    }
    .experiment-control-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: .5rem;
    }
    .stage-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        padding: 0 0 1rem;
        border-bottom: 1px solid var(--line);
    }
    .experiment-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(20rem, .7fr);
        min-height: 32rem;
    }
    .visual-side {
        min-width: 0;
        padding: 1rem 1.5rem 2rem 0;
        border-right: 1px solid var(--line);
    }
    .code-side {
        min-width: 0;
        padding-left: 1.5rem;
        background: transparent;
    }
    .panel-title {
        min-height: 2.6rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .75rem;
        padding: 0 0 .7rem;
        border-bottom: 1px solid var(--line);
        background: transparent;
        font-size: .78rem;
        font-weight: 800;
        color: var(--body);
    }
    .visual-canvas {
        min-height: 28rem;
        padding-top: 1rem;
    }
    .code-pre {
        margin: 0;
        max-height: 35rem;
        overflow: auto;
        padding: .8rem 0 1.2rem;
        color: #37332d;
        font-size: .78rem;
        line-height: 1.72;
        white-space: normal;
        tab-size: 4;
        counter-reset: code-line;
        scroll-padding-block: 4rem;
    }
    .code-line {
        position: relative;
        display: block;
        min-height: 1.72em;
        border-left: 3px solid transparent;
        padding: .08rem .6rem .08rem 3.15rem;
        color: #4b4640;
        font: inherit;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        counter-increment: code-line;
    }
    .code-line::before {
        content: counter(code-line);
        position: absolute;
        left: .65rem;
        width: 1.6rem;
        color: #aaa298;
        text-align: right;
        font-size: .64rem;
        font-weight: 700;
    }
    .code-line.active {
        border-left-color: #b95f42;
        background: #fff1e9;
        color: #241f1b;
        font-weight: 800;
    }
    .code-line.active::before {
        color: #a5513a;
    }
    .flow-grid {
        display: grid;
        grid-template-columns: minmax(0,1fr) 4rem minmax(0,1fr) 4rem minmax(0,1fr);
        gap: .75rem;
        align-items: center;
    }
    .flow-line {
        height: 3px;
        background: #74a989;
        position: relative;
        border-radius: 999px;
    }
    .flow-line::after {
        content: "";
        position: absolute;
        right: -1px;
        top: 50%;
        width: .45rem;
        height: .45rem;
        border-top: 2px solid #4b8a62;
        border-right: 2px solid #4b8a62;
        transform: translateY(-50%) rotate(45deg);
    }
    .mini-card {
        border: 1px solid var(--line);
        border-radius: .5rem;
        background: #fffdf9;
        padding: 1rem;
    }
    .state-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.2rem;
        min-height: 2rem;
        border-radius: .55rem;
        border: 1px solid #cbdff8;
        background: var(--blue-soft);
        color: #1558ad;
        font-size: .78rem;
        font-weight: 800;
        padding: .25rem .55rem;
    }
    .gantt-card {
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
        padding: 1rem 0 0;
    }
    .gantt-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
    }
    .gantt-kicker {
        color: var(--muted);
        font-size: .68rem;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
    }
    .gantt-status {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        color: #5d574f;
        font-size: .7rem;
        font-weight: 700;
        white-space: nowrap;
    }
    .gantt-status::before {
        content: "";
        width: .45rem;
        height: .45rem;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(53,131,90,.12);
    }
    .gantt-scroll {
        overflow-x: auto;
        padding: .25rem .1rem .35rem;
        scrollbar-width: thin;
        scrollbar-color: #c9c0b4 transparent;
    }
    .gantt-timeline {
        position: relative;
        min-width: calc(var(--gantt-columns) * 3.4rem);
    }
    .gantt-grid,
    .gantt-bars,
    .gantt-axis {
        display: grid;
        grid-template-columns: repeat(var(--gantt-columns), minmax(3.4rem, 1fr));
    }
    .gantt-grid {
        height: 4rem;
        border: 1px solid #d9d1c5;
        border-radius: .45rem;
        overflow: hidden;
        background: #f7f3ec;
    }
    .gantt-cell {
        border-right: 1px dashed #d6cec2;
        background: linear-gradient(180deg, rgba(255,255,255,.7), rgba(244,239,231,.55));
    }
    .gantt-cell:last-child {
        border-right: 0;
    }
    .gantt-bars {
        position: absolute;
        inset: 0;
        height: 4rem;
        pointer-events: none;
    }
    .gantt-segment {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        margin: .35rem 0;
        border-right: 1px solid rgba(255,255,255,.7);
        color: #fff;
        font-size: .78rem;
        font-weight: 800;
        box-shadow: inset 0 -2px 0 rgba(0,0,0,.1);
    }
    .gantt-segment:first-child {
        border-radius: .28rem 0 0 .28rem;
    }
    .gantt-segment:last-child {
        border-radius: 0 .28rem .28rem 0;
        border-right: 0;
    }
    .gantt-segment.is-active::after {
        content: "";
        position: absolute;
        inset: -.28rem;
        border: 2px solid #171512;
        border-radius: .45rem;
    }
    .gantt-segment small {
        margin-left: .35rem;
        color: rgba(255,255,255,.78);
        font-size: .62rem;
        font-weight: 700;
    }
    .gantt-tone-0 { background: #216869; }
    .gantt-tone-1 { background: #b95f42; }
    .gantt-tone-2 { background: #3867a6; }
    .gantt-tone-3 { background: #8a6a2f; }
    .gantt-tone-4 { background: #72558a; }
    .gantt-axis {
        position: relative;
        height: 1.55rem;
        color: #777066;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .65rem;
    }
    .gantt-tick {
        position: relative;
        padding-top: .38rem;
    }
    .gantt-tick::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: .3rem;
        background: #a9a095;
    }
    .gantt-end-tick {
        position: absolute;
        right: 0;
        bottom: 0;
        transform: translateX(50%);
    }
    .gantt-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #8a8379;
        font-size: .72rem;
        font-weight: 700;
    }
    .ff-board {
        border: 0;
        border-radius: 0;
        overflow: visible;
        background: transparent;
    }
    .ff-operation {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: .85rem 1rem;
        border-bottom: 1px solid var(--line);
        background: #f4efe7;
    }
    .ff-decision {
        flex: 0 0 auto;
        border: 1px solid #d8d0c4;
        border-radius: .4rem;
        background: #fffdf9;
        color: #575149;
        padding: .38rem .65rem;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .7rem;
        font-weight: 800;
    }
    .ff-decision.reject {
        border-color: #e2c5ba;
        background: #fff4ef;
        color: #9e5039;
    }
    .ff-decision.fit,
    .ff-decision.allocated {
        border-color: #c5dfcd;
        background: #edf8f0;
        color: #286b47;
    }
    .ff-ledger {
        display: grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        border-bottom: 1px solid var(--line);
        background: #fffdf9;
    }
    .ff-ledger-item {
        min-width: 0;
        padding: .75rem 1rem;
        border-right: 1px solid var(--line);
    }
    .ff-ledger-item:last-child {
        border-right: 0;
    }
    .ff-map-scroll {
        overflow-x: auto;
        padding: 2.6rem 1rem 2.4rem;
        scrollbar-width: thin;
        scrollbar-color: #c9c0b4 transparent;
    }
    .ff-map {
        position: relative;
        min-width: 46rem;
        height: 7rem;
        display: flex;
        border: 1px solid #bfb6aa;
        background: #faf7f1;
    }
    .ff-segment {
        position: relative;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-right: 1px solid #cfc6ba;
        color: #645e56;
        font-size: .68rem;
        font-weight: 800;
    }
    .ff-segment:last-of-type {
        border-right: 0;
    }
    .ff-segment.used {
        background: #ded8cf;
        color: #3e3933;
    }
    .ff-segment.free {
        background: repeating-linear-gradient(135deg, #fffdf9 0, #fffdf9 7px, #f3eee6 7px, #f3eee6 14px);
    }
    .ff-segment.current {
        z-index: 1;
        outline: 3px solid #171512;
        outline-offset: -3px;
    }
    .ff-segment.current::before {
        content: "SCAN";
        position: absolute;
        top: -1.8rem;
        left: 50%;
        transform: translateX(-50%);
        color: #171512;
        font-size: .55rem;
        letter-spacing: .08em;
    }
    .ff-segment.current::after {
        content: "";
        position: absolute;
        top: -1rem;
        left: 50%;
        transform: translateX(-50%);
        border: .32rem solid transparent;
        border-top-color: #171512;
    }
    .ff-segment.rejected {
        outline-color: #b95f42;
        background: #fff0ea;
        color: #954a36;
    }
    .ff-segment.selected {
        outline-color: #337957;
        background: #e8f5ec;
        color: #286b47;
    }
    .ff-segment.allocated {
        background: #376c9d;
        color: #fff;
    }
    .ff-segment strong {
        margin-top: .3rem;
        font-size: .8rem;
    }
    .ff-address {
        position: absolute;
        left: 0;
        bottom: -1.65rem;
        transform: translateX(-50%);
        color: #7e766c;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .58rem;
    }
    .ff-map-end {
        position: absolute;
        right: 0;
        bottom: -1.65rem;
        transform: translateX(50%);
        color: #7e766c;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .58rem;
    }
    .ff-direction {
        position: absolute;
        top: -2rem;
        left: 0;
        color: #81796f;
        font-size: .6rem;
        font-weight: 800;
    }
    .ff-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        border-top: 1px solid var(--line);
        background: #faf7f1;
    }
    .ff-summary-item {
        padding: .75rem 1rem;
        border-right: 1px solid var(--line);
    }
    .ff-summary-item:last-child {
        border-right: 0;
    }
    .lru-board {
        border: 0;
        border-radius: 0;
        overflow: visible;
        background: transparent;
    }
    .lru-operation {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: .85rem 1rem;
        border-bottom: 1px solid var(--line);
        background: #f4efe7;
    }
    .lru-result {
        flex: 0 0 auto;
        border: 1px solid #e3c7bc;
        border-radius: .4rem;
        background: #fff5f1;
        color: #9c4f39;
        padding: .35rem .6rem;
        font-size: .7rem;
        font-weight: 800;
    }
    .lru-result.hit {
        border-color: #c8e3d0;
        background: #edf8f0;
        color: #286b47;
    }
    .lru-access-scroll {
        overflow-x: auto;
        border-bottom: 1px solid var(--line);
        scrollbar-width: thin;
        scrollbar-color: #c9c0b4 transparent;
    }
    .lru-access-tape {
        min-width: 34rem;
        display: grid;
        grid-template-columns: repeat(10, minmax(3.4rem,1fr));
        background: #faf7f1;
    }
    .lru-access-cell {
        position: relative;
        display: grid;
        place-items: center;
        height: 3.5rem;
        border-right: 1px solid #e7dfd4;
        color: #a49c92;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: .76rem;
        font-weight: 800;
    }
    .lru-access-cell:last-child {
        border-right: 0;
    }
    .lru-access-cell.visited {
        color: #625c54;
        background: #f2ede5;
    }
    .lru-access-cell.current {
        color: #fff;
        background: #171512;
    }
    .lru-access-cell.current::after {
        content: "NOW";
        position: absolute;
        bottom: .18rem;
        font-size: .48rem;
        letter-spacing: .08em;
    }
    .lru-main {
        display: grid;
        grid-template-columns: minmax(0,1fr) minmax(0,1.15fr);
        min-height: 14rem;
    }
    .lru-section {
        min-width: 0;
        padding: 1rem;
    }
    .lru-section + .lru-section {
        border-left: 1px solid var(--line);
        background: #faf7f1;
    }
    .lru-frames {
        display: grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        gap: .55rem;
        margin-top: .85rem;
    }
    .lru-frame {
        min-width: 0;
        min-height: 6.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid #d9d1c5;
        border-radius: .5rem;
        background: #fffdf9;
        color: #726b62;
    }
    .lru-frame.changed {
        border-color: #b95f42;
        background: #fff4ef;
        box-shadow: inset 0 3px 0 #b95f42;
    }
    .lru-frame.hit {
        border-color: #337957;
        background: #edf8f0;
        box-shadow: inset 0 3px 0 #337957;
    }
    .lru-page-value {
        margin-top: .45rem;
        color: var(--ink);
        font-size: 1.65rem;
        font-weight: 800;
    }
    .lru-recency {
        display: grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        gap: .55rem;
        margin-top: .85rem;
    }
    .lru-recency-item {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 5rem;
        border: 1px solid #d9d1c5;
        border-radius: .5rem;
        background: #fff;
        color: #2f2b27;
        font-size: 1.25rem;
        font-weight: 800;
    }
    .lru-recency-item:first-child {
        border-color: #337957;
        background: #edf8f0;
    }
    .lru-recency-item:last-child {
        border-color: #dbbfb4;
        background: #fff5f1;
    }
    .lru-recency-item small {
        position: absolute;
        bottom: .35rem;
        color: #81796f;

                                        <div class="ff-ledger">
                                            <div class="ff-ledger-item"><p class="gantt-kicker">Request</p><p class="mt-1 text-lg font-bold text-gray-900">P3 · 180MB</p></div>
                                            <div class="ff-ledger-item"><p class="gantt-kicker">Current Block</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.currentBlock"></p></div>
                                            <div class="ff-ledger-item"><p class="gantt-kicker">Scan State</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.status"></p></div>
                                        </div>

                                        <div class="ff-map-scroll">
                                            <div class="ff-map">
                                                <span class="ff-direction">LOW ADDRESS → HIGH ADDRESS</span>
                                                <template x-for="(seg, index) in frame.segments" :key="seg.start + '-' + seg.label">
                                                    <div class="ff-segment"
                                                        :class="[
                                                            seg.type,
                                                            frame.scanIndex === index ? 'current' : '',
                                                            frame.scanIndex === index && frame.decision === 'reject' ? 'rejected' : '',
                                                            frame.scanIndex === index && frame.decision === 'fit' ? 'selected' : ''
                                                        ]"
                                                        :style="'flex:' + seg.size + ' 0 0'">
                                                        <span x-text="seg.label"></span>
                                                        <strong x-text="seg.size + 'MB'"></strong>
                                                        <small class="ff-address" x-text="seg.start"></small>
                                                    </div>
                                                </template>
                                                <small class="ff-map-end">960</small>
                                            </div>
                                        </div>

                                        <div class="ff-summary">
                                            <div class="ff-summary-item"><p class="gantt-kicker">Scanned</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.scanned + ' 块'"></p></div>
                                            <div class="ff-summary-item"><p class="gantt-kicker">Free Blocks</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.freeBlocks"></p></div>
                                            <div class="ff-summary-item"><p class="gantt-kicker">Largest Free</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.largestFree + 'MB'"></p></div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'page'">
                                    <div class="lru-board">
                                        <div class="lru-operation">
                                            <div class="min-w-0">
                                                <p class="gantt-kicker">Current Access</p>
                                                <p class="mt-1 text-sm font-semibold text-gray-900" x-text="frame.note"></p>
                                            </div>
                                            <span class="lru-result" :class="frame.result === 'hit' ? 'hit' : ''"
                                                x-text="frame.result === 'hit' ? '命中 PAGE ' + frame.page : '缺页 PAGE ' + frame.page"></span>
                                        </div>

                                        <div class="lru-access-scroll">
                                            <div class="lru-access-tape">
                                                <template x-for="(page, index) in current.reference" :key="index">
                                                    <span class="lru-access-cell"
                                                        :class="{ 'visited': index < frame.pointer, 'current': index === frame.pointer }"
                                                        x-text="page"></span>
                                                </template>
                                            </div>
                                        </div>

                                        <div class="lru-main">
                                            <section class="lru-section">
                                                <div class="flex items-center justify-between gap-3">
                                                    <div>
                                                        <p class="gantt-kicker">Physical Frames</p>
                                                        <p class="mt-1 text-xs text-gray-600">物理块位置保持固定</p>
                                                    </div>
                                                    <span x-show="frame.victim !== null" class="text-[10px] font-bold text-rose-700" x-text="'淘汰 PAGE ' + frame.victim"></span>
                                                </div>
                                                <div class="lru-frames">
                                                    <template x-for="(block, index) in frame.blocks" :key="index">
                                                        <div class="lru-frame"
                                                            :class="{ 'changed': frame.changed === index, 'hit': frame.result === 'hit' && frame.accessedFrame === index }">
                                                            <span class="gantt-kicker" x-text="'FRAME ' + (index + 1)"></span>
                                                            <strong class="lru-page-value" x-text="block === '' ? '-' : block"></strong>
                                                            <small class="mt-1 text-[9px] font-bold" x-show="frame.changed === index" x-text="frame.victim === null ? '装入' : frame.victim + ' → ' + frame.page"></small>
                                                            <small class="mt-1 text-[9px] font-bold text-emerald-700" x-show="frame.result === 'hit' && frame.accessedFrame === index">命中</small>
                                                        </div>
                                                    </template>
                                                </div>
                                            </section>

                                            <section class="lru-section">
                                                <div class="flex items-center justify-between gap-3">
                                                    <div>
                                                        <p class="gantt-kicker">Recency Order</p>
                                                        <p class="mt-1 text-xs text-gray-600">每次访问后更新最近使用顺序</p>
                                                    </div>
                                                    <span class="text-[10px] font-bold text-gray-500">MRU → LRU</span>
                                                </div>
                                                <div class="lru-recency">
                                                    <template x-for="(page, index) in frame.recency" :key="page">
                                                        <div class="lru-recency-item">
                                                            <span x-text="page"></span>
                                                            <small x-text="index === 0 ? 'MOST RECENT' : (index === frame.recency.length - 1 ? 'EVICT NEXT' : 'RECENT')"></small>
                                                        </div>
                                                    </template>
                                                </div>
                                            </section>
                                        </div>

                                        <div class="lru-stats">
                                            <div class="lru-stat"><p class="gantt-kicker">Faults</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.faults"></p></div>
                                            <div class="lru-stat"><p class="gantt-kicker">Hits</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="frame.hits"></p></div>
                                            <div class="lru-stat"><p class="gantt-kicker">Hit Rate</p><p class="mt-1 text-lg font-bold text-gray-900" x-text="Math.round((frame.hits / (frame.pointer + 1)) * 100) + '%'"></p></div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'thread'">
                                    <div class="pc-board">
                                        <div class="pc-operation">
                                            <div class="min-w-0">
                                                <p class="gantt-kicker">Current Operation</p>
                                                <p class="mt-1 text-sm font-semibold text-gray-900" x-text="frame.explanation"></p>
                                            </div>
                                            <code class="pc-operation-code" x-text="frame.operation"></code>
                                        </div>

                                        <div class="pc-semaphores">
                                            <template x-for="sem in frame.semaphores" :key="sem.label">
                                                <div class="pc-semaphore" :class="sem.before !== sem.after ? 'changed' : ''">
                                                    <p class="gantt-kicker" x-text="sem.label"></p>
                                                    <div class="pc-sem-values">
                                                        <span x-text="sem.before"></span>
                                                        <span>→</span>
                                                        <strong x-text="sem.after"></strong>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>

                                        <div class="pc-pipeline">
                                            <div class="pc-actor" :class="{ 'active': frame.actor === 'producer', 'waiting': frame.producerState.includes('等待') }">
                                                <div>
                                                    <p class="gantt-kicker">Producer</p>
                                                    <p class="mt-2 text-base font-bold text-gray-900">生产者</p>
                                                </div>
                                                <p class="pc-actor-state" x-text="frame.producerState"></p>
                                            </div>
                                            <span class="pc-flow-arrow"></span>
                                            <div class="pc-buffer">
                                                <div class="flex items-center justify-between gap-3">
                                                    <p class="gantt-kicker">Bounded Buffer</p>
                                                    <span class="text-[10px] font-bold text-gray-500" x-text="frame.buffer.filter(Boolean).length + ' / ' + frame.buffer.length"></span>
                                                </div>
                                                <div class="pc-buffer-slots">
                                                    <template x-for="(cell, index) in frame.buffer" :key="index">
                                                        <span class="pc-buffer-slot"
                                                            :class="{ 'filled': Boolean(cell), 'changed': frame.changedSlot === index }"
                                                            x-text="cell || (index + 1)"></span>
                                                    </template>
                                                </div>
                                            </div>
                                            <span class="pc-flow-arrow reverse"></span>
                                            <div class="pc-actor" :class="{ 'active': frame.actor === 'consumer', 'waiting': frame.consumerState.includes('等待') }">
                                                <div>
                                                    <p class="gantt-kicker">Consumer</p>
                                                    <p class="mt-2 text-base font-bold text-gray-900">消费者</p>
                                                </div>
                                                <p class="pc-actor-state" x-text="frame.consumerState"></p>
                                            </div>
                                        </div>

                                        <div class="pc-rule">
                                            <span class="pc-rule-mark">i</span>
                                            <p x-text="frame.note"></p>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="current.kind === 'deadlock'">
                                    <div class="banker-board">
                                        <div class="banker-ledger">
                                            <div class="banker-ledger-block">
                                                <p class="gantt-kicker">Work Before</p>
                                                <p class="mt-1 text-xs text-gray-600">执行前可用资源</p>
                                                <div class="resource-vector">
                                                    <template x-for="(value, index) in frame.workBefore" :key="'before-' + index">
                                                        <span class="resource-unit"><strong x-text="value"></strong><small x-text="resourceLabels[index]"></small></span>
                                                    </template>
                                                </div>
                                            </div>
                                            <span class="banker-ledger-arrow">+</span>
                                            <div class="banker-ledger-block release">
                                                <p class="gantt-kicker">Released</p>
                                                <p class="mt-1 text-xs text-gray-600" x-text="frame.selected ? frame.selected + ' 释放资源' : '等待进程完成'"></p>
                                                <div class="resource-vector">
                                                    <template x-for="(value, index) in frame.released" :key="'released-' + index">
                                                        <span class="resource-unit"><strong x-text="value"></strong><small x-text="resourceLabels[index]"></small></span>
                                                    </template>
                                                </div>
                                            </div>
                                            <span class="banker-ledger-arrow">=</span>
                                            <div class="banker-ledger-block result">
                                                <p class="gantt-kicker">Work After</p>
                                                <p class="mt-1 text-xs text-gray-600">执行后可用资源</p>
                                                <div class="resource-vector">
                                                    <template x-for="(value, index) in frame.workAfter" :key="'after-' + index">
                                                        <span class="resource-unit"><strong x-text="value"></strong><small x-text="resourceLabels[index]"></small></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="banker-matrix">
                                            <div class="banker-matrix-head">
                                                <span>进程</span><span>已分配 Allocation</span><span>还需要 Need</span><span>逐项判断 Need ≤ Work</span>
                                            </div>
                                            <template x-for="proc in frame.processes" :key="proc.name">
                                                <div class="banker-process-row"
                                                    :class="{ 'is-selected': frame.selected === proc.name, 'is-eligible': frame.eligible.includes(proc.name), 'is-done': proc.done }">
                                                    <div>
                                                        <p class="text-sm font-bold text-gray-900" x-text="proc.name"></p>
                                                        <p class="mt-1 text-[10px] font-bold" x-text="proc.done ? '已完成' : (frame.eligible.includes(proc.name) ? '可执行' : '等待')"></p>
                                                    </div>
                                                    <p class="banker-vector-text" x-text="vectorText(proc.allocated)"></p>
                                                    <p class="banker-vector-text" x-text="vectorText(proc.need)"></p>
                                                    <div>
                                                        <span x-show="proc.done" class="banker-done-label">资源已回收，Finish = true</span>
                                                        <div x-show="!proc.done" class="banker-checks">
                                                            <template x-for="(need, index) in proc.need" :key="proc.name + '-' + index">
                                                                <span class="banker-check" :class="need <= frame.workAfter[index] ? 'fits' : ''"
                                                                    x-text="resourceLabels[index] + ': ' + need + (need <= frame.workAfter[index] ? ' ≤ ' : ' > ') + frame.workAfter[index]"></span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>

                                        <div class="safe-sequence">
                                            <div class="mr-auto min-w-0">
                                                <p class="gantt-kicker">Safe Sequence</p>
                                                <p class="mt-1 text-xs text-gray-600" x-text="frame.note"></p>
                                            </div>
                                            <template x-for="(slot, index) in 3" :key="slot">
                                                <div class="contents">
                                                    <span class="safe-sequence-step" :class="frame.sequence[index] ? 'complete' : ''" x-text="frame.sequence[index] || (index + 1)"></span>
                                                    <span x-show="index < 2" class="safe-sequence-arrow">→</span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <aside class="code-side">
                            <div class="panel-title">
                                <span>算法逻辑</span>
                                <span x-text="current.codeLang"></span>
                            </div>
                            <pre class="code-pre"><template x-for="(line, index) in codeLines" :key="index"><code class="code-line" :class="activeCodeLines.includes(index + 1) ? 'active' : ''" :aria-current="activeCodeLines.includes(index + 1) ? 'step' : null" x-text="line || ' '"></code></template></pre>
                        </aside>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('osAlgorithmLab', () => ({
        selected: '',
        immersive: false,
        escapeHandler: null,
        frameIndex: 0,
        running: false,
        timer: null,
        maxFrameReached: 0,
        completedAlgorithms: {},
        resourceLabels: ['A', 'B', 'C'],
        codeLineMap: {
            rr: [[1, 3, 4], [5], [5, 9, 10], [4, 5], [7, 8], [3, 7, 8]],
            firstFit: [[1], [2, 3, 4], [2, 5], [2, 3, 4], [2, 5], [6, 7, 8]],
            lruPage: [
                [4, 5, 6, 10], [4, 5, 6, 10], [4, 5, 6, 10],
                [4, 5, 6, 7, 8, 9, 10], [4, 10],
                [4, 5, 6, 7, 8, 9, 10], [4, 10],
                [4, 5, 6, 7, 8, 9, 10], [4, 5, 6, 7, 8, 9, 10],
                [4, 5, 6, 7, 8, 9, 10],
            ],
            producerConsumer: [[8, 9], [1, 2], [3], [4, 5, 6], [8, 9, 10], [11, 12, 13]],
            banker: [[1, 2, 3, 5, 6], [7, 8, 9, 10], [7, 8, 9, 10], [7, 8, 9, 10]],
        },
        init() {
            this.escapeHandler = (event) => {
                if (event.key === 'Escape' && this.immersive) this.backToCards();
            };
            window.addEventListener('keydown', this.escapeHandler);
        },
        destroy() {
            window.removeEventListener('keydown', this.escapeHandler);
            document.body.classList.remove('os-lab-immersive');
        },
        setImmersive(value) {
            this.immersive = value;
            document.body.classList.toggle('os-lab-immersive', value);
        },
        algorithms: [
            { id: 'rr', mark: '轮', title: 'RR 时间片轮转', tag: '调度', desc: '每个进程获得固定时间片，用完回到队尾。', points: ['时间片', '抢占', '甘特图'] },
            { id: 'firstFit', mark: '首', title: '首次适应分配', tag: '内存', desc: '从低地址开始扫描，命中第一个足够大的空闲区。', points: ['低地址扫描', '切分', '外部碎片'] },
            { id: 'lruPage', mark: 'L', title: 'LRU 页面置换', tag: '页面', desc: '淘汰最近最久未访问的页面。', points: ['访问历史', '最近最久', '缺页'] },
            { id: 'producerConsumer', mark: '线', title: '生产者消费者', tag: '同步', desc: '用 empty、full、mutex 协调共享缓冲区。', points: ['信号量', '临界区', '缓冲区'] },
            { id: 'banker', mark: '锁', title: '银行家算法', tag: '死锁', desc: '通过安全性检查判断资源分配是否会进入危险状态。', points: ['Need', 'Work', '安全序列'] },
        ],

        get current() {
            return this.scenarios()[this.selected] || this.scenarios().rr;
        },
        get frame() {
            return this.current.frames[this.frameIndex] || this.current.frames[0];
        },
        get codeLines() {
            return this.current.code.split('\n');
        },
        get activeCodeLines() {
            return this.codeLineMap[this.selected]?.[this.frameIndex] || [];
        },
        get ganttCapacity() {
            return Math.max(8, ...this.current.frames.map(item => (item.gantt || []).length));
        },
        get ganttSegments() {
            const slots = this.frame.gantt || [];
            const segments = [];
            slots.forEach((label, index) => {
                const previous = segments[segments.length - 1];
                if (previous && previous.label === label) {
                    previous.duration += 1;
                    previous.end += 1;
                    return;
                }
                const processNumber = Number(String(label).match(/\d+/)?.[0] || segments.length);
                segments.push({
                    label,
                    start: index,
                    end: index + 1,
                    duration: 1,
                    tone: processNumber % 5,
                    active: false,
                });
            });
            const latest = segments[segments.length - 1];
            if (latest && this.frame.cpu === latest.label) latest.active = true;
            return segments;
        },
        vectorText(vector) {
            return `[ ${vector.join('  ')} ]`;
        },

        resetLab() {
            if (this.selected) this.logLabEvent('reset_lab');
            this.stopRun();
            this.selected = '';
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.setImmersive(false);
        },
        openAlgorithm(id) {
            this.selected = id;
            this.setImmersive(true);
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.stopRun();
            this.logLabEvent('open_algorithm');
            this.syncCodeFocus();
        },
        backToCards() {
            this.logLabEvent('back_to_cards', { max_frame_reached: this.maxFrameReached });
            this.stopRun();
            this.selected = '';
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.setImmersive(false);
        },
        resetAnimation() {
            this.frameIndex = 0;
            this.maxFrameReached = 0;
            this.stopRun();
            this.logLabEvent('reset_animation');
            this.syncVisualFocus();
            this.syncCodeFocus();
        },
        nextFrame() {
            const last = this.current.frames.length - 1;
            if (this.frameIndex >= last) {
                this.stopRun();
                return;
            }
            this.frameIndex += 1;
            this.maxFrameReached = Math.max(this.maxFrameReached, this.frameIndex);
            this.syncVisualFocus();
            this.syncCodeFocus();
            this.logLabEvent('step');
            if (this.frameIndex === last && !this.completedAlgorithms[this.selected]) {
                this.completedAlgorithms[this.selected] = true;
                this.logLabEvent('complete_algorithm');
                this.stopRun();
            }
        },
        toggleRun() {
            const last = this.current.frames.length - 1;
            if (!this.running && this.frameIndex >= last) {
                this.frameIndex = 0;
                this.maxFrameReached = 0;
            }
            this.running = !this.running;
            if (!this.running) {
                this.logLabEvent('pause_playback');
                this.stopRun();
                return;
            }
            this.logLabEvent('start_playback');
            this.timer = setInterval(() => this.nextFrame(), 2200);
        },
        syncVisualFocus() {
            this.$nextTick(() => {
                let strip = null;
                let current = null;
                if (this.current.kind === 'page') {
                    strip = this.$root.querySelector('.lru-access-scroll');
                    current = strip?.querySelector('.lru-access-cell.current');
                } else if (this.current.kind === 'memory') {
                    strip = this.$root.querySelector('.ff-map-scroll');
                    current = strip?.querySelector('.ff-segment.current, .ff-segment.allocated');
                }
                if (!strip) return;
                if (!current) {
                    strip.scrollTo({ left: 0, behavior: 'smooth' });
                    return;
                }
                strip.scrollTo({
                    left: current.offsetLeft - ((strip.clientWidth - current.clientWidth) / 2),
                    behavior: 'smooth',
                });
            });
        },
        syncCodeFocus() {
            this.$nextTick(() => {
                const panel = this.$root.querySelector('.code-pre');
                const active = panel?.querySelector('.code-line.active');
                if (!panel || !active) return;
                panel.scrollTo({
                    top: Math.max(0, active.offsetTop - (panel.clientHeight / 3)),
                    behavior: 'smooth',
                });
            });
        },
        stopRun() {
            if (this.timer) clearInterval(this.timer);
            this.timer = null;
            this.running = false;
        },
        async logLabEvent(eventType, metadata = {}) {
            const sid = Alpine.store('app')?.currentSessionId;
            if (!sid || !this.selected) return;
            const current = this.current;
            try {
                await fetch('/api/os-lab/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sid,
                        algorithm_id: this.selected,
                        algorithm_title: current.title,
                        event_type: eventType,
                        frame_index: this.frameIndex,
                        total_frames: current.frames.length,
                        metadata,
                    }),
                });
            } catch (error) {
                console.warn('Failed to record OS lab event', error);
            }
        },

        scenarios() {
            return {
                rr: {
                    kind: 'schedule',
                    mark: '轮',
                    title: 'RR 时间片轮转',
                    desc: '每个进程获得固定时间片，用完后回到就绪队列尾部。',
                    codeLang: '伪代码',
                    code: `time_slice = 2

while ready_queue is not empty:
    proc = ready_queue.pop_front()
    run proc for at most time_slice

    if proc.finished:
        done_queue.push(proc)
    else:
        ready_queue.push_back(proc)`,
                    frames: [
                        { ready: ['P1', 'P2', 'P3'], cpu: '', done: [], gantt: [], note: '时间片为 2，调度器选择队首进程' },
                        { ready: ['P2', 'P3'], cpu: 'P1', done: [], gantt: ['P1'], note: 'P1 获得一个时间片' },
                        { ready: ['P2', 'P3', 'P1'], cpu: '', done: [], gantt: ['P1', 'P1'], note: 'P1 未完成，回到队尾' },
                        { ready: ['P3', 'P1'], cpu: 'P2', done: [], gantt: ['P1', 'P1', 'P2'], note: 'P2 开始运行' },
                        { ready: ['P1', 'P2'], cpu: 'P3', done: ['P3'], gantt: ['P1', 'P1', 'P2', 'P2', 'P3'], note: 'P3 在一个时间片内完成' },
                        { ready: [], cpu: '', done: ['P3', 'P1', 'P2'], gantt: ['P1', 'P1', 'P2', 'P2', 'P3', 'P1', 'P1', 'P2'], note: '所有进程完成' },
                    ],
                },
                firstFit: {
                    kind: 'memory',
                    mark: '首',
                    title: '首次适应分配',
                    desc: '从低地址开始，找到第一个足够大的空闲区就分配。',
                    codeLang: '伪代码',
                    code: `request = 180MB
for block in memory_blocks:
    if block.is_used:
        continue
    if block.size >= request:
