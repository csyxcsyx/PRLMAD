{% extends "base.html" %}
{% block content %}
<div x-data="knowledgePage" class="flex flex-col h-full" x-init="loadStatus()">
    <div class="bg-white border-b border-gray-100 px-6 py-3 flex items-center gap-3 flex-shrink-0">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-gray-500 to-slate-600 flex items-center justify-center text-white text-sm font-bold">K</div>
        <div>
            <h2 class="text-sm font-semibold text-gray-800">知识库管理</h2>
            <p class="text-[11px] text-gray-400">教材导入 · 知识检索 · 状态监控</p>
        </div>
    </div>
    <div class="flex-1 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto space-y-5">
            <!-- Status Dashboard -->
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-gray-700 mb-4">知识库概览</h3>
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <div class="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl p-4 text-center border border-blue-100">
                        <p class="text-2xl font-bold text-blue-600" x-text="status.document_count || status.doc_count || 0"></p>
                        <p class="text-xs text-blue-500 font-medium mt-1">文档数</p>
                    </div>
                    <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl p-4 text-center border border-green-100">
                        <p class="text-2xl font-bold text-green-600" x-text="status.chunk_count || 0"></p>
                        <p class="text-xs text-green-500 font-medium mt-1">知识切片</p>
                    </div>
                    <div class="bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl p-4 text-center border border-purple-100">
                        <p class="text-2xl font-bold text-purple-600" x-text="status.course_count || 0"></p>
                        <p class="text-xs text-purple-500 font-medium mt-1">课程数</p>
                    </div>
                </div>
                <div x-show="status.documents && status.documents.length > 0">
                    <p class="text-xs text-gray-500 font-semibold mb-2">已导入文档</p>
                    <div class="space-y-1.5">
                        <template x-for="doc in (status.documents || [])" :key="doc.id">
                            <div class="flex items-center justify-between text-sm p-3 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="flex items-center gap-2">
                                    <span class="label-mark">文档</span>
                                    <span class="text-gray-700 font-medium" x-text="doc.title"></span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full" x-text="doc.course"></span>
                                    <span class="text-xs text-gray-400" x-text="doc.chunk_count + ' 切片'"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <div x-show="!status.documents || status.documents.length === 0" class="text-center py-6">
                    <span class="empty-mark">空</span>
                    <p class="text-sm text-gray-400 mt-2">知识库为空，请先导入教材</p>
                </div>
            </div>

            <!-- Import Section -->
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-gray-700 mb-4">导入教材</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-500 font-medium mb-1 block">教材文件路径</label>
                        <div class="flex gap-2">
                            <input type="text" x-model="ingestPath"
                                placeholder="knowledge/教材-操作系统概念-....pdf"
                                class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-400 outline-none bg-gray-50 placeholder-gray-400" />
                            <button @click="ingestDocument()"
                                class="bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white rounded-xl px-4 py-2.5 text-sm font-medium transition-all shadow-sm disabled:opacity-40 whitespace-nowrap"
                                :disabled="loading || !ingestPath.trim()">
                                导入文件
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs text-gray-500 font-medium mb-1 block">课程名称</label>
                            <input type="text" x-model="ingestCourse" value="操作系统"
                                class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:ring-2 focus:ring-brand-400 outline-none" />
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 font-medium mb-1 block">OCR模式</label>
                            <select x-model="ingestOcr"
                                class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:ring-2 focus:ring-brand-400 outline-none">
                                <option value="auto">自动检测</option>
                                <option value="off">关闭 (文本PDF)</option>
                                <option value="on">强制OCR (扫描PDF)</option>
                            </select>
                        </div>
                    </div>
                    <label class="flex items-center gap-2 text-xs text-gray-500">
                        <input type="checkbox" x-model="forceRebuild" class="accent-brand-500 rounded" />
                        强制重建已有教材（默认关闭；关闭时会跳过完整教材，部分教材从断点继续）
                    </label>
                    <div class="flex gap-3">
                        <button @click="trainFolder()"
                            class="bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white rounded-xl px-4 py-2.5 text-sm font-medium transition-all shadow-sm disabled:opacity-40"
                            :disabled="loading">
                            <span x-show="!training">一键训练 knowledge 文件夹</span>
                            <span x-show="training">正在导入教材...</span>
                        </button>
                    </div>
                    <div x-show="training || trainProgress.events.length" class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs font-semibold text-slate-700" x-text="trainProgress.title || '等待开始'"></p>
                                <p class="text-[11px] text-slate-500 mt-0.5" x-text="trainProgress.detail || '准备读取教材文件'"></p>
                            </div>
                            <span class="text-xs font-semibold text-brand-600" x-text="trainProgress.percent + '%'"></span>
                        </div>
                        <div class="h-2.5 bg-white rounded-full overflow-hidden border border-slate-200">
                            <div class="h-full bg-gradient-to-r from-brand-500 to-emerald-500 transition-all duration-300"
                                :style="'width:' + trainProgress.percent + '%'"></div>
                        </div>
                        <div class="max-h-36 overflow-y-auto space-y-1 pr-1">
                            <template x-for="(ev, idx) in trainProgress.events.slice(-8)" :key="idx">
                                <div class="flex justify-between gap-3 text-[11px] text-slate-500">
                                    <span class="truncate" x-text="ev.label"></span>
                                    <span class="flex-shrink-0" x-text="ev.value"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div x-show="ingestResult" class="text-sm p-3 rounded-xl" :class="ingestResult.ok ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'">
                        <p x-text="ingestResult.ok ? '操作成功!' : '失败: ' + (ingestResult.error || '未知错误')"></p>
                    </div>
                </div>
            </div>

            <!-- Search Section -->
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-gray-700 mb-4">知识检索测试</h3>
                <div class="flex gap-3 mb-4">
                    <input type="text" x-model="searchQuery" @keydown.enter="search()"
                        placeholder="输入关键词测试检索，如：死锁的必要条件"
                        class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50 focus:ring-2 focus:ring-brand-400 outline-none placeholder-gray-400" />
                    <button @click="search()"
                        class="bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white rounded-xl px-5 py-2.5 text-sm font-medium transition-all shadow-sm">
                        检索
                    </button>
                </div>
                <div x-show="searchResults.length > 0" class="space-y-2">
                    <template x-for="(r, idx) in searchResults" :key="idx">
                        <div class="p-3.5 bg-gray-50 rounded-xl border border-gray-100 hover:shadow-sm transition-shadow">
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="text-xs font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded-full" x-text="'#' + (idx + 1)"></span>
                                <span class="text-xs font-medium text-gray-700" x-text="r.title"></span>
                                <span class="text-xs text-gray-400" x-text="r.page"></span>
                                <span class="ml-auto text-[10px] bg-amber-50 text-amber-600 px-2 py-0.5 rounded-full" x-text="'相关度: ' + r.score"></span>
                            </div>
                            <p class="text-xs text-gray-600 leading-relaxed" x-text="r.text ? r.text.slice(0, 400) : ''"></p>
                        </div>
                    </template>
                </div>
                <div x-show="searchQuery && searchResults.length === 0 && !searching" class="text-center py-6 text-xs text-gray-400">
                    未检索到相关内容
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('knowledgePage', () => ({
        loading: false,
        training: false,
        searching: false,
        status: {},
        ingestPath: '',
        ingestCourse: '操作系统',
        ingestOcr: 'auto',
        forceRebuild: false,
        ingestResult: null,
        searchQuery: '',
        searchResults: [],
        trainProgress: {
            title: '',
            detail: '',
            percent: 0,
            events: [],
        },
        async loadStatus() {
            try {
                const resp = await fetch('/api/knowledge/status');
                this.status = await resp.json();
            } catch (e) {}
        },
        async ingestDocument() {
            if (!this.ingestPath.trim()) { alert('请输入文件路径'); return; }
            this.loading = true; this.ingestResult = null;
            try {
                const resp = await fetch('/api/knowledge/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: this.ingestPath, course: this.ingestCourse, ocr_mode: this.ingestOcr }),
                });
                this.ingestResult = await resp.json();
                await this.loadStatus();
            } catch (e) {
                this.ingestResult = { ok: false, error: e.message };
            }
            this.loading = false;
        },
        async trainFolder() {
            this.loading = true; this.training = true; this.ingestResult = null;
            this.trainProgress = { title: '开始训练', detail: '正在扫描 knowledge 文件夹', percent: 0, events: [] };
            try {
                const resp = await fetch('/api/knowledge/train/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        course: this.ingestCourse,
                        ocr_mode: this.ingestOcr,
                        force_rebuild: this.forceRebuild,
                    }),
                });
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    buffer = window.PRLMAD.parseSse(buffer, (eventName, data) => {
                        if (eventName === 'progress') {
                            this.updateTrainProgress(data);
                        } else if (eventName === 'summary') {
                            this.ingestResult = { ok: data.failed_count === 0, summary: data };
                            this.trainProgress.title = '训练完成';
                            this.trainProgress.detail = '成功 ' + data.success_count + ' 个，失败 ' + data.failed_count + ' 个';
                            this.trainProgress.percent = 100;
                        } else if (eventName === 'error') {
                            this.ingestResult = { ok: false, error: data.message || '训练失败' };
                            this.trainProgress.title = '训练失败';
                            this.trainProgress.detail = data.message || '未知错误';
                        }
                    });
                }
                await this.loadStatus();
            } catch (e) {
                this.ingestResult = { ok: false, error: e.message };
            }
            this.loading = false; this.training = false;
        },
        updateTrainProgress(data) {
            const stage = data.stage;
            const total = Number(data.total || data.chunks || data.total_files || 0);
            const current = Number(data.page || data.chunk || data.index || 0);
            const percent = total ? Math.min(100, Math.round((current / total) * 100)) : this.trainProgress.percent;
            const labels = {
                train_discovered: '发现教材文件',
                file_start: '开始导入文件',
                pdf_text_start: '读取PDF页数',
                pdf_text_page: '提取PDF文本',
                pdf_text_done: 'PDF文本提取完成',
                pdf_ocr_start: '开始OCR识别',
                pdf_ocr_page: 'OCR识别页面',
                pdf_ocr_done: 'OCR识别完成',
                file_pages_loaded: '页面读取完成',
                chunk_start: '开始文本切片',
                chunk_done: '文本切片完成',
                db_replace_start: '替换旧记录',
                db_replace_done: '旧记录删除完成',
                db_index_start: '写入知识库索引',
                db_index_chunk: '写入切片索引',
                db_index_done: '索引写入完成',
                file_skipped: '跳过完整教材',
                file_done: '文件导入完成',
                train_done: '训练结束',
            };
            this.trainProgress.title = labels[stage] || stage;
            if (stage === 'pdf_text_page' || stage === 'pdf_ocr_page') {
                this.trainProgress.percent = percent;
                this.trainProgress.detail = '第 ' + current + ' / ' + total + ' 页，已提取 ' + (data.extracted_pages || 0) + ' 页文本';
            } else if (stage === 'db_index_chunk') {
                this.trainProgress.percent = percent;
                this.trainProgress.detail = '切片 ' + current + ' / ' + total + '，页码 ' + data.page_start + '-' + data.page_end;
            } else if (stage === 'file_done') {
                this.trainProgress.percent = 100;
                this.trainProgress.detail = '页数 ' + data.pages + '，切片 ' + data.chunks;
            } else if (stage === 'file_skipped') {
                this.trainProgress.percent = 100;
                this.trainProgress.detail = '已导入 ' + data.existing_pages + ' / ' + data.total_pages + ' 页';
            } else if (stage === 'train_done') {
                this.trainProgress.percent = 100;
                this.trainProgress.detail = '成功 ' + data.success_count + ' 个，失败 ' + data.failed_count + ' 个';
            } else {
                this.trainProgress.detail = data.title || data.file_name || data.path || '';
            }
            this.trainProgress.events.push({
                label: this.trainProgress.title,
                value: this.trainProgress.detail,
            });
        },
        async search() {
            if (!this.searchQuery.trim()) return;
            this.searching = true;
            try {
                const resp = await fetch('/api/knowledge/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: this.searchQuery, top_k: 5 }),
                });
                const data = await resp.json();
                this.searchResults = data.results || [];
            } catch (e) {}
            this.searching = false;
        },
    }));
});
</script>
{% endblock %}
